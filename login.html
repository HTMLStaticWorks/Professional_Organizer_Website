<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Serein Spaces</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts - Inter & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
                    <div class="text-center mb-4">
                        <a class="navbar-brand fs-3 justify-content-center" href="index.html">
                            <i class="bi bi-layers-half text-accent"></i>
                            <span style="font-family: 'Playfair Display', serif;">SEREIN SPACES</span>
                        </a>
                        <p class="text-secondary mt-2">Welcome back! Please login to your account.</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="mb-3 d-flex justify-content-between">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-tertiary text-decoration-none small">Forgot password?</a>
                        </div>
                        <div class="d-grid mb-4">
                            <a href="dashboard.html" class="btn btn-custom btn-lg">Login</a>
                        </div>
                    </form>

                    <div class="text-center mb-4">
                        <span class="text-secondary small">OR LOGIN WITH</span>
                    </div>

                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-outline-secondary rounded-circle px-3"><i class="bi bi-google"></i></button>
                        <button class="btn btn-outline-secondary rounded-circle px-3"><i class="bi bi-facebook"></i></button>
                        <button class="btn btn-outline-secondary rounded-circle px-3"><i class="bi bi-apple"></i></button>
                    </div>

                    <div class="text-center mt-4">
                        <p class="small mb-0">Don't have an account? <a href="signup.html" class="text-tertiary fw-bold">Sign up</a></p>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-secondary text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
