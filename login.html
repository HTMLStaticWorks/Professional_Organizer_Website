<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Space Reset</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts - Inter & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-main">
    <!-- Theme/RTL Toggles -->
    <div class="position-fixed top-0 end-0 m-3 d-flex gap-2" style="z-index: 1050;">
        <button class="btn btn-sm" id="themeToggleMobile" title="Toggle Theme"><i class="bi bi-moon-stars"></i></button>
        <button class="btn btn-sm rtl-toggle" onclick="toggleRTL()" title="Toggle RTL"><i class="bi bi-arrow-left-right"></i></button>
    </div>

    <div class="container py-4">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">

                <div class="auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand d-flex align-items-center justify-content-start mb-4">
                            <span class="brand-logo me-2">SR</span>
                            <span class="fw-bold fs-3">Space <span class="text-accent">Reset</span></span>
                        </a>
                        <h3 class="fw-bold text-main">Welcome Back</h3>
                        <p class="text-muted small mb-0">Please enter your details to sign in.</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Email Address</label>
                            <input type="email" class="auth-input" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Password</label>
                            <div class="position-relative">
                                <input type="password" class="auth-input" id="passwordInput" placeholder="••••••••" required>
                                <button type="button" class="btn btn-sm position-absolute top-50 end-0 translate-middle-y me-2" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="passwordIcon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-accent text-decoration-none small fw-semibold">Forgot password?</a>
                        </div>
                        <div class="d-grid mb-4">
                            <a href="dashboard.html" class="btn btn-primary-brand">Sign In</a>
                        </div>
                    </form>

                    <div class="auth-divider">
                        <span>or continue with</span>
                    </div>

                    <div class="row g-3">
                        <div class="col-4">
                            <button class="btn btn-outline-secondary w-100 py-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C40,22.659,39.862,21.35,33.611,20.083z"/>
                                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C40.481,35.335,44,30.067,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-secondary w-100 py-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.202.129 2.228-1.029C11.235 1.508 11.22-.019 11.182.008zm.53 3.323c-1.154 0-2.348.724-2.887.724-.555 0-1.488-.63-2.394-.63-1.182 0-2.274.673-2.883 1.737-1.228 2.146-.314 5.316.892 7.058.59 0.85 1.284 1.8 2.21 1.8.887 0 1.226-.538 2.308-.538 1.077 0 1.382.538 2.308.538.96 0 1.543-.854 2.13-1.706.684-.993.963-1.954.978-2.007-.023-.01-1.896-.728-1.916-2.903-.017-1.821 1.492-2.697 1.562-2.74-.85-1.241-2.158-1.341-2.635-1.341z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-secondary w-100 py-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#1877F2" viewBox="0 0 24 24">
                                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="text-center mt-5">
                        <p class="small mb-0">Don't have an account? <a href="signup.html" class="text-accent fw-bold">Sign up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
