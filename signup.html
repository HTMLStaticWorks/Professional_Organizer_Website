<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Space Reset</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts - Inter & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-main">

    <!-- Theme/RTL Toggles -->
    <div class="position-fixed top-0 end-0 m-3 d-flex gap-2" style="z-index: 1050;">
        <button class="btn btn-sm" id="themeToggleMobile" title="Toggle Theme"><i class="bi bi-moon-stars"></i></button>
        <button class="btn btn-sm rtl-toggle" onclick="toggleRTL()" title="Toggle RTL"><i class="bi bi-arrow-left-right"></i></button>
    </div>

    <div class="container py-4">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4"> <!-- Removed position-relative as it's no longer needed for these toggles -->

                <div class="auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand d-flex align-items-center justify-content-start mb-4">
                            <span class="brand-logo me-2">SR</span>
                            <span class="fw-bold fs-3">Space <span class="text-accent">Reset</span></span>
                        </a>
                        <h3 class="fw-bold text-main">Create Account</h3>
                        <p class="text-muted small mb-0">Join us to start your organization journey.</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Full Name</label>
                            <input type="text" class="auth-input" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Email Address</label>
                            <input type="email" class="auth-input" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Password</label>
                            <div class="position-relative">
                                <input type="password" class="auth-input" id="passwordInput" placeholder="••••••••" required>
                                <button type="button" class="btn btn-sm position-absolute top-50 end-0 translate-middle-y me-2" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="passwordIcon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-accent text-decoration-none">Terms & Conditions</a></label>
                            </div>
                        </div>
                        <div class="d-grid mb-4">
                            <a href="dashboard.html" class="btn btn-primary-brand">Create Account</a>
                        </div>
                    </form>

                    <div class="auth-divider">
                        <span>or sign up with</span>
                    </div>

                    <div class="row g-3">
                        <div class="col-4">
                            <button class="btn btn-outline-secondary w-100 py-2"><i class="bi bi-google"></i></button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-secondary w-100 py-2"><i class="bi bi-apple"></i></button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-secondary w-100 py-2"><i class="bi bi-facebook"></i></button>
                        </div>
                    </div>

                    <div class="text-center mt-5">
                        <p class="small mb-0">Already have an account? <a href="login.html" class="text-accent fw-bold">Sign in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
